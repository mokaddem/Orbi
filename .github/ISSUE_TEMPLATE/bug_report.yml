name: 🐛 Bug report
description: Something in Orbi isn't working as expected.
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug! Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I pick a capital in Survival mode, ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Play
        2. Choose Capitals → Survival
        3. ...
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Which part of the app?
      options:
        - Play (a quiz mode)
        - Atlas (browsing countries)
        - Progress / History
        - Settings
        - Offline / install (PWA)
        - Other / not sure
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser & device
      description: e.g. Firefox 141 on Android, Safari on iPhone, Chrome on Windows.
      placeholder: Chrome 128 on macOS
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or console errors
      description: Drag in a screenshot, or paste anything from the browser console (F12).
    validations:
      required: false
