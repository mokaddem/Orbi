# Builds the static site and deploys it to GitHub Pages.
#
# Release-driven: Pages is (re)published only when a version tag `v*` is pushed
# (e.g. `v2.1.0`), not on every push to main. Day-to-day pushes and PRs still run
# the full quality gate via ci.yml; a deploy is a deliberate, tagged release.
# Use the `workflow_dispatch` button to publish an untagged build by hand.
#
# The Vite `base` is pinned to `/Orbi/` (see vite.config.ts), which matches a
# GitHub Pages *project* site at https://<user>.github.io/Orbi/. If you fork this
# under a different repo name, update `base` to `/<repo-name>/`.
#
# One-time setup: repo Settings -> Pages -> "Build and deployment" -> Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least-privilege token that can publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer deploy finish rather than cancelling an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Quality gate: never publish a red build. (PRs get the same checks via ci.yml.)
      - run: npm run check
      - run: npm run test
      # `prebuild` regenerates the bundled dataset (scripts/build-data.mjs) from the source
      # packages, then Vite emits the static site (incl. service worker) to dist/.
      - run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
