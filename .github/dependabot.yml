version: 2
updates:
  # Keep npm dependencies up to date, grouped to avoid PR noise.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # typescript-eslint (8.x) still peers to TypeScript < 7, so a TS major bump
      # breaks `npm ci`. Hold it until typescript-eslint supports TS 7, then remove.
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
  # Keep GitHub Actions versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
