<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Lock the page scale: this is a game, so browser pinch-to-zoom on the page (and the
         double-tap zoom) just gets in the way of tapping answers. The interactive map keeps its
         own pinch/zoom — d3-zoom drives it on elements marked `touch-action: none`, independent of
         the browser's page zoom this disables. (iOS Safari may still honour a deliberate zoom.) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#10a5a0" />
    <meta
      name="description"
      content="Orbi — an offline-first game for learning world geography through maps, flags, capitals and more."
    />
    <!-- Open Graph / Twitter share card (Phase 46): one static, branded card for every Orbi link
         (duel links included). A per-duel card (name + score) is impossible client-side — chat
         crawlers can't run JS or read the URL fragment — so that stays server-era future work. URLs
         are absolute to the GitHub Pages base so crawlers resolve them. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Orbi" />
    <meta property="og:title" content="Orbi — learn world geography" />
    <meta
      property="og:description"
      content="Play map, flag and capital quizzes — then duel a friend on the exact same round."
    />
    <meta property="og:url" content="https://mokaddem.github.io/Orbi/" />
    <meta property="og:image" content="https://mokaddem.github.io/Orbi/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Orbi — learn world geography" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Orbi — learn world geography" />
    <meta
      name="twitter:description"
      content="Play map, flag and capital quizzes — then duel a friend on the exact same round."
    />
    <meta name="twitter:image" content="https://mokaddem.github.io/Orbi/og-card.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Orbi" />
    <title>Orbi</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
