<!--
  Source SVG for the maskable PWA icon. Unlike favicon.svg (an edge-to-edge globe on a
  transparent background), a maskable icon must fill the whole square with a solid
  background and keep its content inside the central ~80% "safe zone", because the OS may
  crop it to a circle, rounded square, etc. So: full-bleed accent background + the globe
  from favicon.svg scaled to 70% and centered. Rasterized to PNG by scripts/gen-icons.sh.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#2b6cb0" />
  <g transform="translate(76.8,76.8) scale(11.2)">
    <g fill="none" stroke="#e6f0fa" stroke-width="1.4">
      <circle cx="16" cy="16" r="15" />
      <ellipse cx="16" cy="16" rx="6.5" ry="15" />
      <ellipse cx="16" cy="16" rx="13" ry="15" />
      <line x1="1" y1="16" x2="31" y2="16" />
      <line x1="3.2" y1="9" x2="28.8" y2="9" />
      <line x1="3.2" y1="23" x2="28.8" y2="23" />
    </g>
  </g>
</svg>
